<app-divider>Modal</app-divider>
<button class="ui primary button" (click)= "onClick()">Show Modal</button>
<app-modal (close)="onClick()" *ngIf="modalVisible">
    <div modalTitle>Reusable Modal</div>
    <p>I am a reusable modal component.</p>
    <ng-container modalFooter>
        <button class="ui negative button" (click)="onClick()">Close</button>
        <button class="ui positive button" (click)="onClick()">Accept</button>
    </ng-container>
</app-modal>
<app-divider>Accordion</app-divider>
<app-accordion [items]="items"></app-accordion>
